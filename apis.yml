aid: etherfi
name: ether.fi
description: >-
  ether.fi is a non-custodial, decentralized Ethereum liquid restaking
  protocol where stakers retain control of their validator keys. Users
  deposit ETH to mint eETH, a rebasing liquid restaking token (LRT), or
  wrap it into weETH, the non-rebasing ERC-20 used across DeFi and
  bridged cross-chain via LayerZero to networks including Arbitrum,
  Optimism, Base, Linea, Mode, Scroll, BNB Chain, Blast, Mantle, and
  Solana. Beyond ETH liquid restaking, ether.fi has expanded into eBTC
  (Bitcoin restaking) and eUSD (stablecoin restaking), Liquid auto-
  balancing strategy vaults, the ether.fi Cash non-custodial credit
  card with cashback, "The Club" membership tier program, and an AVS
  operator stack that runs services on EigenLayer, Symbiotic, and Karak.
  The protocol is governed by the ETHFI token via governance.ether.fi.
  ether.fi has no public REST API or developer SDK — its public
  surface is on-chain: open-source Solidity smart contracts on
  Ethereum mainnet (eETH, weETH, LiquidityPool, EtherFiNodesManager,
  EtherFiOracle, MembershipManager, ETHFI), cross-chain bridge
  contracts (weETH-cross-chain via LayerZero, ETHFI via Wormhole NTT),
  AVS operator contracts, plus operator tooling (etherfi-avs-operator,
  eigenpod-proofs-generation) and a public subgraph indexing protocol
  events. ether.fi is one of the largest LRT protocols by TVL with deep
  integrations across Aave, Pendle, Gearbox, Morpho, and other DeFi
  venues.
